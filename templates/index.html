<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内容生成与分发管线</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Content Pipeline</p>
          <h1>内容生成与分发管线</h1>
        </div>
        <div class="status-row" id="statusRow">
          <span>配置读取中</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel input-panel">
          <div class="panel-heading">
            <div>
              <p>素材</p>
              <h2>统一输入</h2>
            </div>
            <button type="button" class="secondary-button" id="pullRecentButton">拉取最近数据</button>
          </div>

          <form id="materialForm" class="material-form">
            <label class="field wide">
              <span>标题提示</span>
              <input name="title_hint" placeholder="例如：商引-商机地图小程序上线">
            </label>

            <label class="field wide">
              <span>素材正文</span>
              <textarea name="raw_content" rows="8" placeholder="粘贴产品介绍、活动信息、数据库素材或运营备注"></textarea>
            </label>

            <label class="field">
              <span>关键词</span>
              <input name="keywords" placeholder="企业服务, 招聘, 楼宇出租">
            </label>

            <label class="field">
              <span>图片路径</span>
              <input name="image_paths" placeholder="D:\images\cover.png">
            </label>

            <fieldset class="platforms">
              <legend>目标平台</legend>
              <label><input type="checkbox" name="platform" value="xiaohongshu" checked> 小红书</label>
              <label><input type="checkbox" name="platform" value="zhihu" checked> 知乎</label>
              <label><input type="checkbox" name="platform" value="official_account" checked> 公众号</label>
            </fieldset>

            <div class="button-row">
              <button type="button" class="ghost-button" id="fillExampleButton">示例</button>
              <button type="button" class="ghost-button" id="clearButton">清空</button>
              <button type="submit" class="primary-button" id="generateButton">生成</button>
            </div>
          </form>
        </section>

        <section class="panel result-panel">
          <div class="panel-heading">
            <div>
              <p>结果</p>
              <h2>平台稿件</h2>
            </div>
            <button type="button" class="secondary-button" id="exportAllButton" disabled>导出全部</button>
          </div>

          <div class="empty-state" id="emptyState">
            <strong>等待生成</strong>
            <span>生成后的稿件会保留格式、状态和导出入口。</span>
          </div>

          <div class="article-list" id="articleList"></div>
        </section>
      </main>

      <section class="panel task-panel">
        <div class="panel-heading">
          <div>
            <p>记录</p>
            <h2>最近任务</h2>
          </div>
          <button type="button" class="secondary-button" id="refreshTasksButton">刷新</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>
    </div>
    <div class="toast" id="toast"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
