<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>内容生成与分发管线</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Content Pipeline</p>
          <h1>内容生成与分发管线</h1>
        </div>
        <div class="topbar-actions">
          <div class="status-row" id="statusRow">
            <span>配置读取中</span>
          </div>
          <button type="button" class="secondary-button" id="settingsButton">设置</button>
        </div>
      </header>

      <section class="panel config-panel hidden" id="configPanel">
        <div class="panel-heading">
          <div>
            <p>设置</p>
            <h2>运行配置</h2>
          </div>
          <button type="button" class="ghost-button" id="closeSettingsButton">关闭</button>
        </div>

        <form id="configForm" class="config-form">
          <label class="field wide">
            <span>本地数据库 URL</span>
            <input name="app_database_url" placeholder="sqlite:///data/pipeline.db">
          </label>

          <label class="field">
            <span>大模型 Base URL</span>
            <input name="llm_base_url" placeholder="https://api.openai.com/v1">
          </label>

          <label class="field">
            <span>大模型名称</span>
            <input name="llm_model" placeholder="gpt-4o-mini">
          </label>

          <label class="field">
            <span>大模型 API Key</span>
            <input type="password" name="llm_api_key" autocomplete="new-password" placeholder="留空保持不变">
          </label>

          <label class="field">
            <span>外部素材数据库 URL</span>
            <input type="password" name="database_url" autocomplete="new-password" placeholder="留空保持不变">
          </label>

          <label class="field">
            <span>待发布目录</span>
            <input name="pending_output_dir" placeholder="data/pending">
          </label>

          <label class="field">
            <span>公众号 App ID</span>
            <input name="wechat_app_id" placeholder="wx...">
          </label>

          <label class="field">
            <span>公众号 App Secret</span>
            <input type="password" name="wechat_app_secret" autocomplete="new-password" placeholder="留空保持不变">
          </label>

          <fieldset class="switches wide">
            <legend>发布设置</legend>
            <label><input type="checkbox" name="wechat_auto_publish"> 公众号自动发布</label>
            <label><input type="checkbox" name="wechat_enable_mass_send"> 允许公众号群发</label>
          </fieldset>

          <div class="config-note wide" id="configNote"></div>

          <div class="button-row">
            <button type="submit" class="primary-button" id="saveConfigButton">保存设置</button>
          </div>
        </form>
      </section>

      <main class="workspace">
        <section class="panel input-panel">
          <div class="panel-heading">
            <div>
              <p>素材</p>
              <h2>统一输入</h2>
            </div>
            <button type="button" class="secondary-button" id="pullRecentButton">拉取最近数据</button>
          </div>

          <form id="materialForm" class="material-form">
            <label class="field wide">
              <span>标题提示</span>
              <input name="title_hint" placeholder="例如：商引-商机地图小程序上线">
            </label>

            <label class="field wide">
              <span>素材正文</span>
              <textarea name="raw_content" rows="8" placeholder="粘贴产品介绍、活动信息、数据库素材或运营备注"></textarea>
            </label>

            <label class="field">
              <span>关键词</span>
              <input name="keywords" placeholder="企业服务, 招聘, 楼宇出租">
            </label>

            <label class="field">
              <span>图片路径</span>
              <input name="image_paths" placeholder="D:\images\cover.png">
            </label>

            <fieldset class="platforms">
              <legend>目标平台</legend>
              <label><input type="checkbox" name="platform" value="xiaohongshu" checked> 小红书</label>
              <label><input type="checkbox" name="platform" value="zhihu" checked> 知乎</label>
              <label><input type="checkbox" name="platform" value="official_account" checked> 公众号</label>
            </fieldset>

            <div class="button-row">
              <button type="button" class="ghost-button" id="fillExampleButton">示例</button>
              <button type="button" class="ghost-button" id="clearButton">清空</button>
              <button type="submit" class="primary-button" id="generateButton">生成</button>
            </div>
          </form>
        </section>

        <section class="panel result-panel">
          <div class="panel-heading">
            <div>
              <p>结果</p>
              <h2>平台稿件</h2>
            </div>
            <button type="button" class="secondary-button" id="exportAllButton" disabled>导出全部</button>
          </div>

          <div class="empty-state" id="emptyState">
            <strong>等待生成</strong>
            <span>生成后的稿件会保留格式、状态和导出入口。</span>
          </div>

          <div class="article-list" id="articleList"></div>
        </section>
      </main>

      <section class="panel task-panel">
        <div class="panel-heading">
          <div>
            <p>记录</p>
            <h2>最近任务</h2>
          </div>
          <button type="button" class="secondary-button" id="refreshTasksButton">刷新</button>
        </div>
        <div class="task-list" id="taskList"></div>
      </section>
    </div>
    <div class="toast" id="toast"></div>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
