services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-content_pipeline}
      POSTGRES_USER: ${POSTGRES_USER:-content_pipeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-content_pipeline}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-content_pipeline}:${POSTGRES_PASSWORD:-content_pipeline}@postgres:5432/${POSTGRES_DB:-content_pipeline}
      DATABASE_URL: "${DATABASE_URL:-}"
      DATABASE_IMAGE_BASE_URL: "${DATABASE_IMAGE_BASE_URL:-}"
      APP_DB_POOL_SIZE: ${APP_DB_POOL_SIZE:-5}
      APP_DB_MAX_OVERFLOW: ${APP_DB_MAX_OVERFLOW:-10}
      APP_DB_POOL_RECYCLE_SECONDS: ${APP_DB_POOL_RECYCLE_SECONDS:-1800}
      CONTENT_CELERY_BROKER_URL: redis://redis:6379/0
      CONTENT_CELERY_RESULT_BACKEND: redis://redis:6379/0
      CONTENT_CELERY_QUEUE: content_pipeline
      CONTENT_CELERY_GENERATION_QUEUE: content_pipeline.generation
      CONTENT_CELERY_BATCH_QUEUE: content_pipeline.batch
      CONTENT_LLM_API_KEY: "${CONTENT_LLM_API_KEY:-}"
      CONTENT_LLM_BASE_URL: "${CONTENT_LLM_BASE_URL:-https://api.openai.com/v1}"
      CONTENT_LLM_MODEL: "${CONTENT_LLM_MODEL:-gpt-4o-mini}"
      CONTENT_LLM_MOCK: "${CONTENT_LLM_MOCK:-false}"
      CONTENT_PIPELINE_UPLOADS_DIR: /app/data/uploads
      CONTENT_PIPELINE_IMAGES_DIR: /app/data/images
      PENDING_OUTPUT_DIR: /app/data/pending
      SCHEDULER_ENABLED: "${SCHEDULER_ENABLED:-false}"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: .
    restart: unless-stopped
    command:
      [
        "celery",
        "-A",
        "pipeline.task_queue.celery_app",
        "worker",
        "-Q",
        "content_pipeline,content_pipeline.generation,content_pipeline.batch",
        "--loglevel=INFO",
        "--concurrency=${CELERY_WORKER_CONCURRENCY:-2}",
      ]
    environment:
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-content_pipeline}:${POSTGRES_PASSWORD:-content_pipeline}@postgres:5432/${POSTGRES_DB:-content_pipeline}
      DATABASE_URL: "${DATABASE_URL:-}"
      DATABASE_IMAGE_BASE_URL: "${DATABASE_IMAGE_BASE_URL:-}"
      APP_DB_POOL_SIZE: ${WORKER_DB_POOL_SIZE:-5}
      APP_DB_MAX_OVERFLOW: ${WORKER_DB_MAX_OVERFLOW:-10}
      APP_DB_POOL_RECYCLE_SECONDS: ${APP_DB_POOL_RECYCLE_SECONDS:-1800}
      CONTENT_CELERY_BROKER_URL: redis://redis:6379/0
      CONTENT_CELERY_RESULT_BACKEND: redis://redis:6379/0
      CONTENT_CELERY_QUEUE: content_pipeline
      CONTENT_CELERY_GENERATION_QUEUE: content_pipeline.generation
      CONTENT_CELERY_BATCH_QUEUE: content_pipeline.batch
      CONTENT_LLM_API_KEY: "${CONTENT_LLM_API_KEY:-}"
      CONTENT_LLM_BASE_URL: "${CONTENT_LLM_BASE_URL:-https://api.openai.com/v1}"
      CONTENT_LLM_MODEL: "${CONTENT_LLM_MODEL:-gpt-4o-mini}"
      CONTENT_LLM_MOCK: "${CONTENT_LLM_MOCK:-false}"
      CONTENT_PIPELINE_UPLOADS_DIR: /app/data/uploads
      CONTENT_PIPELINE_IMAGES_DIR: /app/data/images
      PENDING_OUTPUT_DIR: /app/data/pending
      SCHEDULER_ENABLED: "false"
    volumes:
      - app_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  app_data:
